name: Android Release Build

on:
  push:
    branches: [ main ]
    paths:
      - 'androidApp/**'
      - 'shared/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/wrapper/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'androidApp/**'
      - 'shared/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/wrapper/**'

jobs:
  build:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Decode the base64-encoded keystore stored in GitHub Secrets
      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.keystore

      - name: Build release APK
        run: |
          ./gradlew :androidApp:assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # Extract versionName from build.gradle.kts (e.g. versionName = "1.0" → 1.0)
      - name: Extract version name
        id: version
        run: |
          VERSION=$(grep 'versionName' androidApp/build.gradle.kts | sed 's/.*versionName = "\(.*\)".*/\1/')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: perya-odds-v${{ steps.version.outputs.name }}-${{ github.sha }}
          path: androidApp/build/outputs/apk/release/*.apk
          retention-days: 30

      # Create a Git tag on push to main (not on PRs)
      - name: Create version tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.version.outputs.name }}-${{ github.run_number }}"
          git tag "$TAG"
          git push origin "$TAG"
