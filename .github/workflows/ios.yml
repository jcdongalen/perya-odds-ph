name: iOS Build

on:
  push:
    branches: [ main ]
    paths:
      - 'iosApp/**'
      - 'shared/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/wrapper/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'iosApp/**'
      - 'shared/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/wrapper/**'

jobs:
  build:
    name: Build iOS (simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build shared KMP framework for iOS
        run: ./gradlew :shared:assembleXCFramework --no-daemon

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build iOS app (simulator, no signing)
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty || true

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs-${{ github.sha }}
          path: ~/Library/Logs/gym/
          retention-days: 7
